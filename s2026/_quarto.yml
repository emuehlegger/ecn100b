project:
  type: default

format:
  html:
    toc: false
    toc-depth: 3
    toc-location: right
    number-sections: false
    anchor-sections: true
    smooth-scroll: false
    theme: cosmo
    #css: styles.css
    embed-resources: true
    self-contained: true
    format-links: false
    fig-cap-location: bottom
    code-copy: true
    code-fold: true
    link-external-newwindow: true
    citations-hover: false
    html-math-method: mathml
    crossref:
      fig-title: "Figure"
      tbl-title: "Table"
      eq-title: "Equation"
    include-in-header:
      - mathjax-accessibility.html

  pdf:
    toc: false
    number-sections: false
    documentclass: article
    geometry:
      - margin=1in
    fontsize: 11pt
    linestretch: 1.1
    colorlinks: true
    linkcolor: blue
    urlcolor: blue
    citecolor: blue
    fig-pos: "htbp"

  revealjs:
    embed-resources: true
    html-math-method: mathml
    theme: default
    slide-number: true
    hash: true
    default-image-extension: svg
    controls: true
    progress: true
    center: false
    transition: slide
    incremental: false
    #pdf: true
    #pdf-export: true
    #pdf-separate-fragments: false
    chalkboard: false
    preview-links: true
    slide-level: 1
    css: slidestyle.css

execute:
  echo: false
  warning: false
  message: false
  cache: false


######################################################################
# Notes on key options (quick reference)
#
# HTML
# - embed-resources / self-contained: bundle images/CSS/JS into the HTML output so
#   you can post a single file (useful for Canvas uploads or offline viewing).
# - toc / number-sections / anchor-sections: navigation + stable deep links.
# - code-copy / code-fold: helpful if you show code or solutions occasionally.
#
# PDF
# - documentclass / geometry / fontsize / linestretch: readable handouts.
# - colorlinks: clickable links in the PDF (instead of boxed links).
# - fig-pos: default LaTeX figure placement suggestion.
#
# revealjs
# - incremental: false ensures bullets do NOT reveal one-by-one by default.
# - pdf-export: true enables Quarto’s revealjs PDF export when rendering
#   (you’ll typically get an HTML deck and a PDF version in the output).
# - pdf-separate-fragments: false avoids expanding incremental fragments into
#   extra PDF pages (since incremental is off anyway).
######################################################################